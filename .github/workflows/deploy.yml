name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            PROJECT_DIR="/home/dserver/share_folder/application/TrendCart_Project"
            FRONTEND_DIR="$PROJECT_DIR/frontend"

            mkdir -p "$PROJECT_DIR"
            mkdir -p "$FRONTEND_DIR"

            # ── Sync docker-compose.yml (frontend only) ───────────────────
            cat > "$PROJECT_DIR/docker-compose.yml" << 'COMPOSE_EOF'
            services:
              trendcart_frontend:
                build:
                  context: ./frontend
                  dockerfile: Dockerfile
                container_name: trendcart_frontend
                restart: always
                env_file:
                  - ./frontend/.env
                environment:
                  - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://trendcartapi.deefthanawat.online}
                ports:
                  - "59124:3000"
                networks:
                  - trendcart_net

            networks:
              trendcart_net:
                driver: bridge
            COMPOSE_EOF

            # ── Clone หรือ pull frontend repo ──────────────────────────────
            if [ ! -d "$FRONTEND_DIR/.git" ]; then
              echo "[INFO] First-time setup: cloning frontend repo..."
              cd "$FRONTEND_DIR"
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
              git fetch --all
              git reset --hard origin/main
              git branch -M main
            else
              echo "[INFO] Pulling latest frontend code..."
              cd "$FRONTEND_DIR"
              git pull origin main
            fi

            # ── docker compose อยู่ที่ PROJECT_DIR (root) ─────────────────
            cd "$PROJECT_DIR"

            echo "[INFO] Building frontend Docker image..."
            docker compose build trendcart_frontend

            echo "[INFO] Restarting frontend container..."
            docker compose up -d --no-deps trendcart_frontend

            echo "[SUCCESS] Frontend deployed!"
